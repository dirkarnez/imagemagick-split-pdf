name: build-workflow
on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
    contents: write
    
jobs:
  build:
    strategy:
      matrix:
        os: [ windows-latest ] # , ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2

      - shell: cmd
        run: |
          curl https://imagemagick.org/archive/binaries/ImageMagick-7.1.2-18-portable-Q16-HDRI-x64.7z -L -O -J &&^
          7z x ImageMagick-7.1.2-18-portable-Q16-HDRI-x64.7z -o"ImageMagick-7.1.2-18-portable-Q16-HDRI-x64"
          
      - name: Archive Release
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          path: ${{ github.event.repository.name }}*
          filename: "${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.os }}.zip"
          
      - name: Release prebuilt
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.os }}.zip"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
